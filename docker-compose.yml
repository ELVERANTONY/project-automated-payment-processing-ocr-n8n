version: "3.8"
services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=https://lucky-stars-heal.loca.lt
    volumes:
      - n8n_data:/home/node/.n8n

  cobrapp-ocr-api:
    build: 
      context: ./cobrapp-ocr-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./pagos:/app/pagos

volumes:
  n8n_data:
